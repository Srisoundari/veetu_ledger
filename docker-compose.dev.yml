# Dev override: run frontend with Vite (hot reload) instead of nginx
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  backend:
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
      - /app/.venv      # preserve .venv built in image (same fix as node_modules below)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
